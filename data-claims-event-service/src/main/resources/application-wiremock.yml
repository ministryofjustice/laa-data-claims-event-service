laa:
  provider-details-api:
    host: http://localhost:8192
    url: ${laa.provider-details-api.host}
    accessToken: 123
  claims-api:
    host: http://localhost:8190
    url: ${laa.claims-api.host}
    accessToken: 123
  fee-scheme-platform-api:
    host: http://localhost:8191
    url: ${laa.claims-api.host}
    accessToken: 123
  bulk-claim-queue:
    name: claims-api-queue

spring:
  output:
    ansi:
      enabled: always
  cloud:
    aws:
      credentials:
        access-key: "dummy-access-key"
        secret-key: "dummy-secret-key"
      region:
        static: "us-east-1"
      endpoint: "http://localhost:4566"

logging:
  level:
    root: ${ROOT_LOGGING_LEVEL:info}
    org.springframework: ${SPRING_LOGGING_LEVEL:info}
    uk.gov.justice.laa.dstew.payments.claimsdata: ${APP_LOGGING_LEVEL:info}
  structured:
    format:
      console: "" # disables structured logging locally
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr{faint} %clr([%15.15t]){faint} %clr([%X{traceId:-},%X{spanId:-}]){yellow} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"