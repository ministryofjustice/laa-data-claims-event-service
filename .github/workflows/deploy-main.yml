name: Deploy main

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

env:
  JAVA_VERSION: &JAVA_VERSION '25'
  JDK_DISTRIBUTION: &JDK_DISTRIBUTION 'corretto'

jobs:
  assemble:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@dc4173bfc12f714d7e8cbdd9f524d00ef02e25c4 # v2
    permissions:
      contents: write
      packages: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      build_command: 'assemble'
      publish_package: 'false'
      junit_results: 'false'
      junit_report: 'false'
      checkstyle_report: 'false'
      jacoco_coverage_report: 'false'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      aws_region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_AWS_REGION }}

  sca-scan:
    needs:
      - assemble
    uses: ./.github/workflows/sca-analysis.yml
    permissions:
      contents: read
      security-events: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  pact-test:
    needs: [ assemble ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@dc4173bfc12f714d7e8cbdd9f524d00ef02e25c4 # v2
    permissions:
      contents: write
      packages: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      pacticipant_name: "laa-data-claims-event-service"
      pact_test_task: "pactTest"
      publish_pact_results: true
      git_branch: 'main'
      pact_tags: '${{ needs.assemble.outputs.published_artifact_version }},candidate'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  ecr-publish-image:
    needs: [ assemble ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@68d8f5aeccd47fa5baa1fe6c63269569b682e656 # v2
    permissions:
      contents: read
      id-token: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      jar_subproject: 'data-claims-event-service'
      image_version: ${{ format('{0}-{1}', vars.LAA_DATA_CLAIMS_EVENT_SERVICE_IMAGE_PREFIX, needs.assemble.outputs.published_artifact_version) }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY }}
      ecr_region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION }}
      ecr_role_to_assume: ${{ secrets.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_ROLE_TO_ASSUME }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}

  deploy-uat:
    needs:
      - ecr-publish-image
      - pact-test
      - sca-scan
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: uat
      deployment_name: uat
      claim_api_environment_name: main
      image_tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}
    secrets: inherit

  deploy-staging:
    needs:
      - ecr-publish-image
      - pact-test
      - deploy-uat
      - sca-scan
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: staging
      deployment_name: stg
      claim_api_environment_name: stg
      image_tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}
    secrets: inherit

  deploy-production:
    needs:
      - ecr-publish-image
      - pact-test
      - deploy-staging
      - sca-scan
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: production
      deployment_name: prod
      claim_api_environment_name: prod
      image_tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}
    secrets: inherit
