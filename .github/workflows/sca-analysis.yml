name: SCA - Software Composition Analysis

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: '21'
      java_distribution:
        required:  false
        type: string
        default: 'corretto'
    secrets:
      gh_token:
        required: true
  workflow_dispatch:
    inputs:
      java_version:
        description: 'Java version to use'
        required: false
        default: '21'
      java_distribution:
        description: 'JDK distribution (temurin, corretto, etc.)'
        required: false
        default: 'corretto'

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK ${{ inputs.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Build app jar with gradle
        run: ./gradlew assemble -x test --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token }}

      - name: Run SCA
        uses: ministryofjustice/devsecops-actions/sca@7dc13c20e2bf541b8a77fa1320a04983b18846f6 # v1.6.0
        with:
          token: ${{ secrets.gh_token }}
          renovate: "false"
