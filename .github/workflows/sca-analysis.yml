name: SCA - Software Composition Analysis

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: '21'
      java_distribution:
        required:  false
        type: string
        default: 'corretto'
    secrets:
      gh_token:
        required: true
  workflow_dispatch:
    inputs:
      java_version:
        description: 'Java version to use'
        required: false
        default: '21'
      java_distribution:
        description: 'JDK distribution (temurin, corretto, etc.)'
        required: false
        default: 'corretto'

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ inputs.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build app jar with gradle
        run: ./gradlew assemble -x test --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token }}

      - name: Run SCA
        uses: ministryofjustice/devsecops-actions/sca@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0
        with:
          token: ${{ secrets.gh_token }}
          renovate: "false"