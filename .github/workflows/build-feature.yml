# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build feature

on:
  push:
    branches-ignore:
      - main

env:
  JAVA_VERSION: &JAVA_VERSION '25'
  JDK_DISTRIBUTION: &JDK_DISTRIBUTION 'corretto'

jobs:
  snyk-diagnostics:
    runs-on: ubuntu-latest
    outputs:
      snyk_token_present: ${{ steps.check.outputs.snyk_token_present }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Snyk secrets presence and validate token (no install)
        id: check
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_CLIENT_ID: ${{ secrets.SNYK_CLIENT_ID }}
          SNYK_CLIENT_SECRET: ${{ secrets.SNYK_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          echo "SNYK_TOKEN present: ${SNYK_TOKEN:+yes}"
          echo "SNYK_CLIENT_ID present: ${SNYK_CLIENT_ID:+yes}"
          echo "SNYK_CLIENT_SECRET present: ${SNYK_CLIENT_SECRET:+yes}"
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "snyk_token_present=false" >> $GITHUB_OUTPUT
            echo "No SNYK_TOKEN available in this job"
            exit 0
          fi

          # Validate token using Snyk API (no CLI install, no config persistence)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $SNYK_TOKEN" \
            "https://snyk.io/api/v1/orgs" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "snyk_token_present=true" >> $GITHUB_OUTPUT
            echo "Snyk token validated (200 OK)"
          elif [ "$HTTP_CODE" = "401" ]; then
            echo "snyk_token_present=false" >> $GITHUB_OUTPUT
            echo "Snyk returned 401 Unauthorized: token invalid or lacks access (SNYK-0005)"
          else
            echo "snyk_token_present=false" >> $GITHUB_OUTPUT
            echo "Snyk token check returned HTTP status: $HTTP_CODE (network error or unexpected response)"
          fi
  build:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
  
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      integration_test_task: "integrationTest"
      publish_package: 'false'
      semgrep_check: 'true'
      junit_results_path: 'data-claims-event-service/build/test-results'
      junit_report_path: 'data-claims-event-service/build/reports/tests'
      checkstyle_report_path: 'data-claims-event-service/build/reports/checkstyle'
      jacoco_coverage_report_path: 'data-claims-event-service/build/reports/jacoco'
    secrets:
      # requires a pat due to accessing a private github repos packages (providers-api)
      gh_token: ${{ secrets.PHILS_PAT_TOKEN }}
      aws_region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_AWS_REGION }}

  pact-test:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-data-claims-event-service"
      pact_test_task: "pactTest"
      publish_pact_results: true
      enable_can_i_merge: true
      provider_name: "laa-data-claims-api"
      is_provider: false
      pact_tags: "feature"
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
    secrets:
      # requires a pat due to accessing a private github repos packages (providers-api)
      gh_token: ${{ secrets.PHILS_PAT_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  publish-image:
    needs:
      - build
      - pact-test
      - snyk-diagnostics
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      jar_subproject: 'data-claims-event-service'
      image_version: ${{ format('{0}-{1}', vars.LAA_DATA_CLAIMS_EVENT_SERVICE_IMAGE_PREFIX, needs.build.outputs.published_artifact_version) }}
      publish: false
    secrets:
      # requires a pat due to accessing a private github repos packages (providers-api)
      gh_token: ${{ secrets.PHILS_PAT_TOKEN }} 
      ecr_repository: ""
      ecr_region: ""
      ecr_role_to_assume: ""
      snyk_token: ${{ secrets.SNYK_TOKEN }}
