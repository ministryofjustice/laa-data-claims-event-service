# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build feature

on:
  push:
    branches-ignore:
      - main
env:
  JAVA_VERSION: &JAVA_VERSION '25'
  JDK_DISTRIBUTION: &JDK_DISTRIBUTION 'corretto'

jobs:
  build:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@dc4173bfc12f714d7e8cbdd9f524d00ef02e25c4 # v2
    permissions:
      contents: write
      packages: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      integration_test_task: "integrationTest"
      publish_package: 'false'
      junit_results_path: 'data-claims-event-service/build/test-results'
      junit_report_path: 'data-claims-event-service/build/reports/tests'
      checkstyle_report_path: 'data-claims-event-service/build/reports/checkstyle'
      jacoco_coverage_report_path: 'data-claims-event-service/build/reports/jacoco'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      aws_region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_AWS_REGION }}

  sca-scan:
    needs:
      - build
    uses: ./.github/workflows/sca-analysis.yml
    permissions:
      contents: read
      security-events: write
    with:
      java-version: *JAVA_VERSION
      distribution: *JDK_DISTRIBUTION
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  pact-test:
    needs: [ build ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@dc4173bfc12f714d7e8cbdd9f524d00ef02e25c4 # v2
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-data-claims-event-service"
      pact_test_task: "pactTest"
      publish_pact_results: true
      enable_can_i_merge: true
      provider_name: "laa-data-claims-api"
      is_provider: false
      pact_tags: "feature"
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  snyk-auth:
    name: Obtain Short-lived token
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.snyk_auth.outputs.token }}
    steps:
      - name: Obtain Short-lived token
        id: snyk_auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/snyk-auth@main
        with:
          client_id: ${{ secrets.SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}
      - name: Debug, show step output (masked)
        run: |
          TOK='${{ steps.snyk_auth.outputs.token }}'
          if [ -z "$TOK" ]; then
            echo "STEP-OUTPUT: token is EMPTY"
          else
            echo "STEP-OUTPUT: token length: ${#TOK}"
            echo "STEP-OUTPUT: token suffix: ${TOK: -4}"
          fi

  snyk-verify:
    needs: [snyk-auth]
    runs-on: ubuntu-latest
    steps:
      - name: Verify Snyk token via API (masked)
        env:
          TOKEN: ${{ needs['snyk-auth'].outputs.token }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "SNYK token is EMPTY"
            exit 1
          fi
          echo "SNYK token length: ${#TOKEN}"
          echo "SNYK token suffix: ${TOKEN: -4}"
          # Verify token by calling a Snyk API endpoint that requires auth.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" https://snyk.io/api/v1/orgs)
          echo "Snyk /orgs endpoint HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Snyk token verification failed (HTTP $HTTP_STATUS). Token likely invalid or lacks permissions."
            exit 1
          fi
          echo "Snyk token verified OK (HTTP 200)."

  publish-image:
    needs:
      - snyk-auth
      - pact-test
      - sca-scan
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@68d8f5aeccd47fa5baa1fe6c63269569b682e656 # v2
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      jar_subproject: 'data-claims-event-service'
      image_version: ${{ format('{0}-{1}', vars.LAA_DATA_CLAIMS_EVENT_SERVICE_IMAGE_PREFIX, needs.build.outputs.published_artifact_version) }}
      publish: false
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ""
      ecr_region: ""
      ecr_role_to_assume: ""
      snyk_token: ${{ needs['snyk-auth'].outputs.token }}
