name: Build validation poc image

on:
  workflow_call:
    secrets:
      LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_ROLE_TO_ASSUME:
        required: true
    outputs:
      validation_poc_tag:
        description: "validation poc image tag pushed to ECR"
        value: ${{ jobs.build.outputs.validation_poc_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    outputs:
      validation_poc_tag: ${{ steps.build.outputs.validation_poc_tag }}
    steps:
      - name: Checkout validation poc repo
        uses: actions/checkout@v6
        with:
          repository: ministryofjustice/laa-data-claims-validation-api-poc
          ref: DSTEW-POC


      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle assemble
        run: ./gradlew assemble

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION }}

      - name: Login ecr
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push validation poc image
        id: build
        run: |
          set -euo pipefail
          image_tag="validation-poc-${GITHUB_SHA}"
          image="${{ steps.login-ecr.outputs.registry }}/${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY }}:${image_tag}"
          echo "Building image: $image"
          docker build -f Dockerfile -t "$image" .
          echo "Pushing image..."
          docker push "$image"
          echo "Pushed to ECR: $image"
          echo "validation_poc_tag=$image_tag" >> "$GITHUB_OUTPUT"
