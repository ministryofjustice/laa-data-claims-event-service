replicas: 2

terminationGracePeriodSeconds: 600

clusterDomain: apps.live.cloud-platform.service.justice.gov.uk
metrics:
  mainReleaseName: production

image:
  repository: ""

ports:
  protocol: TCP
  port: 80
  targetPort: 8085

management:
  enabled: true
  protocol: TCP
  port: 8081
  targetPort: 8081

securityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000

ingress:
  externalRoute:
    enabled: false
    hostname:
      enabled: false

serviceAccountName: claims-event-service-prod-irsa-serviceaccount

probe:
  enabled: true
  # readiness endpoint for graceful shutdown - defaults to our actuator drain-ready endpoint
  # returns DOWN when drain is active, but can be set to the same value as livenessEndpoint if desired
  readinessEndpoint: /actuator/health/readiness

lifecycle:
  preStop:
    enabled: true
    # endpoint to call to initiate drain; can be set to the same value as probe.readinessEndpoint if desired
    drainEndpoint: /actuator/maintenance/drain
    # maximum seconds to wait for the drain call to complete (used as curl --max-time)
    timeoutSeconds: 600

stickiness:
  enabled: true

env:
  - name: AWS_REGION
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: AWS_REGION
  - name: PROVIDER_DETAILS_API_HOSTNAME
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: PROVIDER_DETAILS_API_HOSTNAME
  - name: PROVIDER_DETAILS_API_ACCESS_TOKEN
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: PROVIDER_DETAILS_API_ACCESS_TOKEN
  - name: CLAIMS_API_HOSTNAME
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: CLAIMS_API_HOSTNAME
  - name: CLAIMS_API_ACCESS_TOKEN
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: CLAIMS_API_ACCESS_TOKEN
  - name: FEE_SCHEME_PLATFORM_API_URL
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: FEE_SCHEME_PLATFORM_API_URL
  - name: FEE_SCHEME_PLATFORM_API_ACCESS_TOKEN
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: FEE_SCHEME_PLATFORM_API_ACCESS_TOKEN
  - name: BULK_CLAIM_QUEUE_NAME
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: BULK_CLAIM_QUEUE_NAME
  - name: SUBMISSION_VALIDATION_MINIMUM_PERIOD
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: SUBMISSION_VALIDATION_MINIMUM_PERIOD
  - name: CLAIM_VALIDATION_BATCH_SIZE
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: CLAIM_VALIDATION_BATCH_SIZE
  - name: APPLICATION_LOGGING_LEVEL
    valueFrom:
      secretKeyRef:
        name: laa-data-claims-event-service-secrets
        key: APPLICATION_LOGGING_LEVEL
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxDirectMemorySize=128m"

grafana:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 8
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

resources:
  limits:
    cpu: 1000m
    memory: 1G
  requests:
    cpu: 25m
    memory: 1G

sentry:
  enabled: true
  environment: production
  tracesSampleRate: 0.2